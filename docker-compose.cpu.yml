services:
  haqq-backend:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: haqq-backend-cpu
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      # Persist downloaded models across container restarts
      - model-cache:/app/.cache

volumes:
  model-cache:
